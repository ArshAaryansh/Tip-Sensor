<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Sens Writer</title>
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #333; font-family: 'Segoe UI', sans-serif; }
        
        /* Layer Styles */
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #pink-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffc0cb; opacity: 0.6; pointer-events: none; }
        #draw-canvas, #skeleton-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* UI Layer */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        #title { font-size: 6rem; font-weight: bold; color: rgba(255, 255, 255, 0.8); margin-top: 10vh; pointer-events: none; }
        
        .panel { position: absolute; bottom: 30px; display: flex; gap: 20px; pointer-events: auto; }
        #status { background: rgba(0,0,0,0.6); color: white; padding: 15px 25px; border-radius: 50px; font-weight: bold; }
        button { padding: 15px 30px; background: #000; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #444; }
    </style>
</head>
<body>

    <video id="webcam"></video>
    <div id="pink-overlay"></div>
    <canvas id="draw-canvas"></canvas>
    <canvas id="skeleton-canvas"></canvas>

    <div id="ui-layer">
        <h1 id="title"> </h1>
        <div class="panel">
            <div id="status">✊ Fist - Not Writing</div>
            <button onclick="clearCanvas()">Clear Board</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const dCanvas = document.getElementById('draw-canvas');
        const sCanvas = document.getElementById('skeleton-canvas');
        const status = document.getElementById('status');
        
        const dCtx = dCanvas.getContext('2d');
        const sCtx = sCanvas.getContext('2d');

        let lastX, lastY;
        let isDrawing = false;

        // Sync canvas sizes
        function resize() {
            [dCanvas, sCanvas].forEach(c => { c.width = window.innerWidth; c.height = window.innerHeight; });
        }
        window.addEventListener('resize', resize);
        resize();

        function clearCanvas() { dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height); }

        // MediaPipe Setup
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

hands.onResults((results) => {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                // Flip the skeleton drawing to match the mirrored video feed
                sCtx.save();
                sCtx.scale(-1, 1);
                sCtx.translate(-sCanvas.width, 0);
                
                drawConnectors(sCtx, lm, HAND_CONNECTIONS, {color: '#FFFFFF', lineWidth: 4});
                drawLandmarks(sCtx, lm, {color: '#FFFD00', radius: 5});
                
                sCtx.restore();

                // Detect openness: Check if finger tips are above the PIP joints (knuckles)
                const isOpen = (
                    lm[8].y < lm[6].y && 
                    lm[12].y < lm[10].y && 
                    lm[16].y < lm[14].y && 
                    lm[20].y < lm[18].y
                );

                if (isOpen) {
                    status.innerText = "✋ Open Hand - Writing";
                    // landmark.x goes from 0-1, 1-x flips it to match the mirror
                    const x = (1 - lm[8].x) * dCanvas.width;
                    const y = lm[8].y * dCanvas.height;

                    if (isDrawing) {
                        dCtx.strokeStyle = '#000000';
                        dCtx.lineWidth = 8;
                        dCtx.lineCap = 'round';
                        dCtx.beginPath();
                        dCtx.moveTo(lastX, lastY);
                        dCtx.lineTo(x, y);
                        dCtx.stroke();
                    }
                    lastX = x; lastY = y;
                    isDrawing = true;
                } else {
                    status.innerText = "✊ Fist - Not Writing";
                    isDrawing = false;
                }
            } else {
                isDrawing = false;
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
